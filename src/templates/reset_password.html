<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLoop — Nuova Password</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}?v=3" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/foodloop.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.4/dist/turbo.es2017-esm.js"></script>
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <img src="{{ url_for('static', filename='logo.png') }}?v=3" alt="FoodLoop">
        </div>

        <div class="auth-badge">
            <i data-lucide="shield-check" style="width:14px;height:14px;"></i>
            Accesso Sicuro
        </div>

        <h2 class="auth-title">Imposta Nuova Password</h2>
        <p class="auth-subtitle">Scegli una password sicura di almeno 6 caratteri per il tuo account FoodLoop.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="auth-flash">
                        <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0;"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.reset_password', token=token) }}" method="POST">
            <div class="auth-field">
                <label class="auth-label">Nuova Password</label>
                <input class="auth-input" type="password" name="new_password"
                       placeholder="Almeno 6 caratteri" required autofocus minlength="6">
            </div>
            <div class="auth-field">
                <label class="auth-label">Conferma Password</label>
                <input class="auth-input" type="password" name="confirm_password"
                       placeholder="Ripeti la password" required minlength="6">
            </div>
            <button type="submit" class="auth-btn">
                <i data-lucide="lock" style="width:18px;height:18px;"></i>
                Salva Nuova Password
            </button>
        </form>

        <div class="auth-links" style="margin-top:1.5rem;text-align:center;">
            <a href="{{ url_for('auth.login') }}" class="auth-link">
                <i data-lucide="arrow-left" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;"></i>
                Torna al Login
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Validazione lato client: le due password devono coincidere
        const form = document.querySelector('form');
        form.addEventListener('submit', function(e) {
            const p1 = form.querySelector('[name="new_password"]').value;
            const p2 = form.querySelector('[name="confirm_password"]').value;
            if (p1 !== p2) {
                e.preventDefault();
                alert('Le password non coincidono. Riprova.');
            }
        });
    </script>
</body>
</html>
