<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLoop — Pagina non trovata</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}?v=3" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/foodloop.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .error-card {
            text-align: center;
            max-width: 480px;
            padding: 56px 48px;
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: var(--r-xl);
            box-shadow: var(--shadow-lg);
            animation: fadeInUp var(--t-slow) var(--ease-out) both;
        }
        .error-icon-ring {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px; height: 80px;
            border-radius: 50%;
            background: var(--primary-glow);
            border: 2px solid rgba(16,185,129,0.22);
            margin-bottom: 28px;
        }
        .error-icon-ring i { width: 36px; height: 36px; color: var(--primary); }
        .error-code {
            font-size: 72px; font-weight: 900;
            color: var(--primary);
            line-height: 1;
            letter-spacing: -3px;
            margin-bottom: 8px;
        }
        .error-title {
            font-size: 20px; font-weight: 700;
            color: var(--text-1);
            margin-bottom: 10px;
        }
        .error-desc {
            font-size: 14px; color: var(--text-3);
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .error-actions {
            display: flex; gap: 12px;
            justify-content: center; flex-wrap: wrap;
        }
    </style>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.4/dist/turbo.es2017-esm.js"></script>
</head>
<body>
    <div class="error-card">
        <div class="error-icon-ring">
            <i data-lucide="map-pin-off"></i>
        </div>
        <div class="error-code">404</div>
        <div class="error-title">Pagina non trovata</div>
        <p class="error-desc">
            La pagina che stai cercando non esiste o è stata spostata.<br>
            Torna alla dashboard per continuare a gestire il tuo locale.
        </p>
        <div class="error-actions">
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary">
                <i data-lucide="layout-dashboard"></i>
                Torna alla Dashboard
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary">
                <i data-lucide="arrow-left"></i>
                Indietro
            </a>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
