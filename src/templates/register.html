<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.M. - Registrazione</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <div style="background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px;">
        <h2 style="color: #2c3e50; text-align: center;">Registra Ristorante</h2>
        
        <form method="POST">
            <div style="margin-bottom: 1rem;">
                <label>Nome Ristorante</label>
                <input type="text" name="restaurant_name" required style="width: 100%; padding: 0.5rem; margin-top: 0.5rem; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 1rem;">
                <label>Email</label>
                <input type="email" name="email" required style="width: 100%; padding: 0.5rem; margin-top: 0.5rem; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label>Password</label>
                <input type="password" name="password" required style="width: 100%; padding: 0.5rem; margin-top: 0.5rem; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <button type="submit" style="width: 100%; padding: 0.75rem; background-color: #2980b9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem;">Registrati</button>
        </form>
        <p style="text-align: center; margin-top: 1rem;">Hai già un account? <a href="{{ url_for('auth.login') }}" style="color: #27ae60;">Accedi qui</a></p>
    </div>
</body>
</html>
