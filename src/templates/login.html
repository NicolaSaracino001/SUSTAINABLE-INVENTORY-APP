<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLoop — Accedi</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}?v=2" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/foodloop.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.4/dist/turbo.es2017-esm.js"></script>
</head>
<body class="auth-page">
    <!-- Sfondo dinamico: due layer per crossfade + overlay -->
    <div class="auth-bg-a" id="authBgA"></div>
    <div class="auth-bg-b" id="authBgB"></div>
    <div class="auth-overlay"></div>

    <div class="auth-card">
        <div class="auth-logo">
            <img src="{{ url_for('static', filename='logo.png') }}?v=2" alt="FoodLoop">
        </div>
        <h2 class="auth-title">Bentornato</h2>
        <p class="auth-subtitle">Accedi per gestire la tua intelligenza di magazzino.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="auth-flash">
                        <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0;"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="auth-field">
                <label class="auth-label">Email Operativa</label>
                <input class="auth-input" type="email" name="email"
                       placeholder="es. mario@ristorante.it" required>
            </div>
            <div class="auth-field">
                <label class="auth-label">Password</label>
                <input class="auth-input" type="password" name="password"
                       placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn">
                <i data-lucide="log-in" style="width:18px;height:18px;"></i>
                Accedi a FoodLoop
            </button>
        </form>

        <p class="auth-footer">
            Non hai un account?
            <a href="{{ url_for('auth.register') }}" class="auth-link">Registrati</a>
        </p>
    </div>
    <script>
        lucide.createIcons();

        // ── Background Slideshow ──────────────────────────────────────────────
        (function () {
            const PHOTOS = [
                'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1920&q=80&auto=format&fit=crop',
                'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1920&q=80&auto=format&fit=crop',
                'https://images.unsplash.com/photo-1559339352-11d035aa65de?w=1920&q=80&auto=format&fit=crop',
                'https://images.unsplash.com/photo-1600565193348-f74bd3c7ccdf?w=1920&q=80&auto=format&fit=crop',
            ];
            const layerA = document.getElementById('authBgA');
            const layerB = document.getElementById('authBgB');
            let cur = 0, useA = true;

            function preloadAndShow(url, layer) {
                const img = new Image();
                img.onload = () => { layer.style.backgroundImage = `url(${url})`; };
                img.src = url;
            }

            function showNext() {
                const url = PHOTOS[cur % PHOTOS.length];
                if (useA) {
                    preloadAndShow(url, layerA);
                    layerA.style.opacity = '1';
                    layerB.style.opacity = '0';
                } else {
                    preloadAndShow(url, layerB);
                    layerB.style.opacity = '1';
                    layerA.style.opacity = '0';
                }
                useA = !useA;
                cur++;
            }

            // Prima immagine subito
            showNext();
            // Poi cicla ogni 7 secondi
            setInterval(showNext, 7000);
        })();
    </script>
</body>
</html>
