<div class="sidebar">
    <div class="logo-container" id="sidebar-logo" data-turbo-permanent>
        <img src="{{ url_for('static', filename='logo.png') }}?v=2" alt="FoodLoop" class="logo-img">
        <span class="brand-name">FoodLoop</span>
    </div>

    <nav class="nav-menu">
        <span class="nav-section">Core</span>
        <a href="{{ url_for('main.dashboard') }}"
           class="nav-item {% if sidebar_active == 'dashboard' %}active{% endif %}">
            <i data-lucide="layout-dashboard"></i> Overview
        </a>
        <a href="{{ url_for('main.inventory') }}"
           class="nav-item {% if sidebar_active == 'inventory' %}active{% endif %}">
            <i data-lucide="package"></i> Magazzino
        </a>

        <span class="nav-section">Operatività</span>
        <a href="{{ url_for('main.menu') }}"
           class="nav-item {% if sidebar_active == 'menu' %}active{% endif %}">
            <i data-lucide="book-open"></i> Menu Planner
        </a>
        <a href="{{ url_for('main.suppliers') }}"
           class="nav-item {% if sidebar_active == 'suppliers' %}active{% endif %}">
            <i data-lucide="shopping-cart"></i> Fornitori & Ordini
        </a>

        <span class="nav-section">AI Tools</span>
        <a href="{{ url_for('main.invoice_scanner') }}"
           class="nav-item {% if sidebar_active == 'invoice_scanner' %}active{% endif %}">
            <i data-lucide="scan-line"></i> Invoice Scanner
        </a>
        <a href="{{ url_for('main.sales_offload') }}"
           class="nav-item {% if sidebar_active == 'sales_offload' %}active{% endif %}">
            <i data-lucide="receipt"></i> Chiusura Cassa
        </a>
    </nav>

    <div class="bottom-nav">
        <div class="nav-divider"></div>
        <span class="nav-section">Business</span>
        <a href="{{ url_for('main.analytics') }}"
           class="nav-item {% if sidebar_active == 'analytics' %}active{% endif %}">
            <i data-lucide="pie-chart"></i> Reports & Analysis
        </a>

        {% if current_user.role == 'owner' %}
        <span class="nav-section">Impostazioni</span>
        <a href="{{ url_for('main.profile') }}"
           class="nav-item {% if sidebar_active == 'profile' %}active{% endif %}">
            <i data-lucide="user"></i> Account
        </a>
        <a href="{{ url_for('main.settings') }}"
           class="nav-item {% if sidebar_active == 'settings' %}active{% endif %}">
            <i data-lucide="settings"></i> Gestione Team
        </a>
        {% endif %}

        <a href="{{ url_for('auth.logout') }}" class="nav-item nav-item--danger" style="margin-top: 8px;">
            <i data-lucide="log-out"></i> Logout
        </a>
    </div>
</div>

<!-- ═══ Mobile Bottom Navigation (visibile solo su ≤768px) ═══ -->
<nav class="mobile-bottom-nav">
    <a href="{{ url_for('main.dashboard') }}"
       class="mobile-nav-item {% if sidebar_active == 'dashboard' %}active{% endif %}">
        <i data-lucide="layout-dashboard"></i>
        <span>Home</span>
    </a>
    <a href="{{ url_for('main.inventory') }}"
       class="mobile-nav-item {% if sidebar_active == 'inventory' %}active{% endif %}">
        <i data-lucide="package"></i>
        <span>Magazzino</span>
    </a>
    <a href="{{ url_for('main.sales_offload') }}"
       class="mobile-nav-item {% if sidebar_active == 'sales_offload' %}active{% endif %}">
        <i data-lucide="receipt"></i>
        <span>Cassa</span>
    </a>
    <a href="{{ url_for('main.analytics') }}"
       class="mobile-nav-item {% if sidebar_active == 'analytics' %}active{% endif %}">
        <i data-lucide="pie-chart"></i>
        <span>Report</span>
    </a>
    <a href="{{ url_for('main.profile') }}"
       class="mobile-nav-item {% if sidebar_active == 'profile' %}active{% endif %}">
        <i data-lucide="user"></i>
        <span>Account</span>
    </a>
</nav>
