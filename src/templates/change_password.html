<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLoop — Imposta Password</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}?v=2" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/foodloop.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <img src="{{ url_for('static', filename='logo.png') }}?v=2" alt="FoodLoop">
        </div>

        <div class="auth-badge">
            <i data-lucide="shield-check" style="width:14px;height:14px;"></i>
            Accesso Sicuro
        </div>

        <h2 class="auth-title">Imposta Password</h2>
        <p class="auth-subtitle">Per motivi di sicurezza, crea una password personale per accedere a FoodLoop.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="auth-flash">
                        <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0;"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.change_password') }}" method="POST">
            <div class="auth-field">
                <label class="auth-label">Nuova Password</label>
                <input class="auth-input" type="password" name="new_password"
                       placeholder="Almeno 6 caratteri" required>
            </div>
            <div class="auth-field">
                <label class="auth-label">Conferma Password</label>
                <input class="auth-input" type="password" name="confirm_password"
                       placeholder="Ripeti la password" required>
            </div>
            <button type="submit" class="auth-btn">
                <i data-lucide="lock" style="width:18px;height:18px;"></i>
                Salva ed Entra
            </button>
        </form>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
