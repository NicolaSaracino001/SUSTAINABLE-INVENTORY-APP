<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLoop - Imposta Password</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}?v=2" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #a3e635 0%, #16a34a 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;
        }
        .auth-card {
            background: white; padding: 40px; border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); width: 100%; max-width: 420px;
            text-align: center;
        }
        .logo-img { height: 80px; margin-bottom: 20px; border-radius: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
        h2 { margin: 0 0 10px 0; color: #0f172a; font-size: 24px; font-weight: 700; }
        p { color: #64748b; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 8px; }
        input {
            width: 100%; padding: 14px 16px; border: 1px solid #e2e8f0;
            border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 14px;
            outline: none; transition: all 0.2s; box-sizing: border-box; background: #f8fafc;
        }
        input:focus { border-color: #16a34a; background: white; box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1); }
        
        .btn-primary {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); color: white;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(22, 163, 74, 0.2); }
        
        .flash-msg { padding: 12px; margin-bottom: 20px; border-radius: 8px; font-size: 13px; background-color: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: flex; align-items: center; gap: 8px; text-align: left;}
        
        .security-badge {
            display: inline-flex; align-items: center; gap: 6px; background: #f0fdf4; color: #16a34a;
            padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 20px; border: 1px solid #bbf7d0;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="{{ url_for('static', filename='logo.png') }}?v=2" alt="FoodLoop" class="logo-img">
        
        <div class="security-badge">
            <i data-lucide="shield-check" style="width: 14px;"></i> Accesso Sicuro
        </div>

        <h2>Imposta Password</h2>
        <p>Per motivi di sicurezza, devi creare una tua password personale per il primo accesso a <strong>FoodLoop</strong>.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-msg"><i data-lucide="alert-circle" style="width: 16px;"></i> {{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.change_password') }}" method="POST">
            <div class="form-group">
                <label>Nuova Password</label>
                <input type="password" name="new_password" placeholder="Almeno 6 caratteri" required>
            </div>
            <div class="form-group">
                <label>Conferma Password</label>
                <input type="password" name="confirm_password" placeholder="Ripeti la password" required>
            </div>
            <button type="submit" class="btn-primary">
                <i data-lucide="lock" style="width: 18px;"></i> Salva ed Entra
            </button>
        </form>
    </div>
    
    <script>lucide.createIcons();</script>
</body>
</html>
